<!doctype html>
<html>
<head><meta charset="utf-8"><title>Filter Results</title><link rel="stylesheet" href="/static/style.css"></head>
<body class="bg">
  <div class="overlay container">
    <h1>Category: {{ cat }}</h1>
    <a class="btn" href="/user">Back</a>
    <table class="table" style="margin-top:12px;">
      <tr><th>Title</th><th>Author</th><th>Category</th><th>Action</th></tr>
      {% for b in books %}
      <tr>
        <td>{{ b.title }}</td>
        <td>{{ b.author }}</td>
        <td>{{ b.category }}</td>
        <td>
          {% if b.available %}
           <a class="btn small" href="/borrow/{{ b.id }}">Borrow</a>
          {% else %}
           <span class="muted">Not available</span>
          {% endif %}
        </td>
      </tr>
      {% endfor %}
    </table>
  </div>
</body>
</html>
