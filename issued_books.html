<!DOCTYPE html>

            width: 80%;

        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table th, table td {
            border: 1px solid gray;
            padding: 10px;
            text-align: center;
        }

        table th {
            background: #34495e;

        }
