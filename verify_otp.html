<!doctype html>
<html>
<head><meta charset="utf-8"><title>Verify OTP</title><link rel="stylesheet" href="/static/style.css"></head>
<body class="bg">
  <div class="overlay">
    <div class="login-box">
      <h2 style="text-align:center">Verify OTP</h2>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <form method="POST" action="/verify_otp">
        <input name="otp" placeholder="Enter OTP" required>
        <div style="text-align:center"><button type="submit">Verify</button></div>
      </form>
    </div>
  </div>
</body>
</html>
