<!doctype html>
<html>
<head><meta charset="utf-8"><title>Forgot Password</title><link rel="stylesheet" href="/static/style.css"></head>
<body class="bg">
  <div class="overlay">
    <div class="login-box">
      <h2 style="text-align:center">Forgot Password</h2>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <form method="POST" action="/forgot">
        <input name="email" placeholder="Registered Email" required>
        <div style="text-align:center"><button type="submit">Send OTP</button></div>
      </form>
    </div>
  </div>
</body>
</html>
